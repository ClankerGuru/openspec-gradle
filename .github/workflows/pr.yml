name: PR Check

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Verify plugins apply cleanly
        run: |
          ./gradlew publishToMavenLocal
          PLUGIN_VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')
          mkdir -p /tmp/verify-project
          cd /tmp/verify-project
          cat > settings.gradle.kts << SETTINGS
          rootProject.name = "verify"
          SETTINGS
          echo "" > build.gradle.kts
          mkdir -p gradle/init.d
          cat > gradle/init.d/test.init.gradle.kts << INIT
          initscript {
              repositories {
                  mavenLocal()
                  mavenCentral()
                  gradlePluginPortal()
              }
              dependencies {
                  classpath("zone.clanker:plugin-srcx:$PLUGIN_VERSION")
                  classpath("zone.clanker:plugin-opsx:$PLUGIN_VERSION")
                  classpath("zone.clanker:srcx-tasks:$PLUGIN_VERSION")
                  classpath("zone.clanker:opsx-tasks:$PLUGIN_VERSION")
              }
          }
          beforeSettings {
              apply<zone.clanker.srcx.SrcxPlugin>()
              apply<zone.clanker.opsx.OpsxPlugin>()
          }
          INIT
          gradle --init-script gradle/init.d/test.init.gradle.kts srcx-context opsx-sync
          echo "✅ Plugins apply and generate files"
          find .claude -type f | sort || true
          find .github -type f | sort || true
