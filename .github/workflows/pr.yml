name: PR Check

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew build -PskipSigning

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Verify plugin applies cleanly
        run: |
          ./gradlew publishToMavenLocal -PskipSigning
          mkdir -p /tmp/verify-project
          echo 'rootProject.name = "verify"' > /tmp/verify-project/settings.gradle.kts
          echo 'plugins { id("zone.clanker.gradle") }' > /tmp/verify-project/build.gradle.kts
          cd /tmp/verify-project
          gradle --init-script <(cat <<'EOF'
          initscript {
              repositories { mavenLocal() }
              dependencies { classpath("zone.clanker:openspec-gradle:0.1.0") }
          }
          allprojects {
              if (project == rootProject) {
                  apply<zone.clanker.gradle.OpenSpecPlugin>()
              }
          }
          EOF
          ) openspecSync
          echo "✅ Plugin applies and generates files"
          find .github -type f | sort
