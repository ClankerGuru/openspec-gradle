name: PR Check

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew build -PRELEASE_SIGNING_ENABLED=false

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: PR Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Verify plugin applies cleanly
        run: |
          ./gradlew publishToMavenLocal -PRELEASE_SIGNING_ENABLED=false
          PLUGIN_VERSION=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')
          mkdir -p /tmp/verify-project
          cd /tmp/verify-project
          cat > settings.gradle.kts << SETTINGS
          pluginManagement {
              repositories {
                  mavenLocal()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  mavenLocal()
                  mavenCentral()
              }
          }
          plugins {
              id("zone.clanker.gradle") version "$PLUGIN_VERSION"
          }
          rootProject.name = "verify"
          SETTINGS
          echo "" > build.gradle.kts
          gradle opsx-sync
          echo "✅ Plugin applies and generates files"
          find .github -type f | sort
