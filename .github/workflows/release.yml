name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write
  checks: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Verify version matches release tag
        run: |
          EXPECTED="${{ github.event.release.tag_name }}"
          EXPECTED="${EXPECTED#v}"
          ACTUAL=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! build.gradle.kts=$ACTUAL but release tag=$EXPECTED"
            exit 1
          fi
          echo "✅ Version matches: $ACTUAL"

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Build and test
        run: ./gradlew build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Publish to Gradle Plugin Portal
        continue-on-error: true
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        continue-on-error: true
        run: ./gradlew publishAggregationToCentralPortal
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Attach JARs to release
        run: gh release upload "${{ github.event.release.tag_name }}" build/libs/*.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s|id(\"zone.clanker.gradle\") version \"[^\"]*\"|id(\"zone.clanker.gradle\") version \"$VERSION\"|g" README.md
          if git diff --quiet README.md; then
            echo "README already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update README version to $VERSION"
            git push origin HEAD:main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
