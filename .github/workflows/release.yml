name: Release

on:
  release:
    types: [ published ]

permissions:
  contents: write
  checks: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Verify version matches release tag
        run: |
          EXPECTED="${{ github.event.release.tag_name }}"
          EXPECTED="${EXPECTED#v}"
          ACTUAL=$(./gradlew -q properties | grep '^version:' | awk '{print $2}')
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! build.gradle.kts=$ACTUAL but release tag=$EXPECTED"
            exit 1
          fi
          echo "✅ Version matches: $ACTUAL"

      - name: Build and test
        run: ./gradlew build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/build/test-results/test/*.xml'
          reporter: java-junit

      - name: Publish to Gradle Plugin Portal
        continue-on-error: true  # Pending domain approval for zone.clanker
        run: ./gradlew :plugin:publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

      - name: Publish to Maven Central
        run: ./gradlew :plugin:publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_RELEASE_SIGNING_ENABLED: true

      - name: Attach JARs to release
        run: gh release upload "${{ github.event.release.tag_name }}" plugin/build/libs/*.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
