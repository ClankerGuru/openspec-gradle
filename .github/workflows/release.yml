name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write
  checks: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Build and test
        run: ./gradlew build

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Publish to Gradle Plugin Portal
        continue-on-error: true
        run: ./gradlew publishPlugins
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Publish to Maven Central
        continue-on-error: true
        run: ./gradlew publishAggregationToCentralPortal
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          
          # Build release body
          cat > release-notes.md << 'HEADER'
          ## Installation
          
          ### Gradle Plugin Portal
          
          ```kotlin
          plugins {
              id("zone.clanker.gradle") version "$VERSION_PLACEHOLDER"
          }
          ```
          
          ### Maven Central
          
          ```kotlin
          dependencies {
              classpath("zone.clanker:openspec-gradle:$VERSION_PLACEHOLDER")
          }
          ```
          
          ### Global (zero-config)
          
          ```bash
          # Clone, build, and install globally
          git clone https://github.com/ClankerGuru/openspec-gradle.git
          cd openspec-gradle
          ./gradlew installGlobal
          ```
          
          Then configure in `~/.gradle/gradle.properties`:
          ```properties
          zone.clanker.openspec.agents=github
          ```
          
          HEADER
          
          sed -i "s/\$VERSION_PLACEHOLDER/$VERSION/g" release-notes.md
          
          # Add changelog if there's a previous tag
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" >> release-notes.md
            echo "" >> release-notes.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges >> release-notes.md
            echo "" >> release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          append_body: true
          files: |
            build/libs/*.jar
